name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version, for example v0.1.0"
        required: true

permissions:
  contents: write

jobs:
  build-and-release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: ubuntu-latest
            goos: linux
            goarch: amd64
          # Temporarily disable linux/arm64 release builds.
          # - runner: ubuntu-24.04-arm
          #   goos: linux
          #   goarch: arm64
          - runner: macos-14
            goos: darwin
            goarch: arm64
    runs-on: ${{ matrix.runner }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            version="${{ github.event.inputs.version }}"
          else
            version="${GITHUB_REF_NAME}"
          fi
          echo "value=${version}" >> "$GITHUB_OUTPUT"

      - name: Resolve build metadata
        id: build_meta
        shell: bash
        run: |
          echo "commit=$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"
          echo "build_time=$(date -u +%Y-%m-%dT%H:%M:%SZ)" >> "$GITHUB_OUTPUT"

      - name: Fetch BoxLite native library
        shell: bash
        working-directory: third_party/boxlite-go
        env:
          BOXLITE_SDK_VERSION: v0.7.6
        run: go run ./cmd/setup

      - name: Package release archive
        shell: bash
        run: |
          chmod +x scripts/package-release.sh
          VERSION="${{ steps.version.outputs.value }}" \
          COMMIT="${{ steps.build_meta.outputs.commit }}" \
          BUILD_TIME="${{ steps.build_meta.outputs.build_time }}" \
          DIST_DIR=dist \
          APP=csgclaw \
          GOCACHE="${{ github.workspace }}/.gocache" \
          GO_BUILD_TAGS=boxlite_sdk \
          CGO_ENABLED=1 \
          ./scripts/package-release.sh "${{ matrix.goos }}" "${{ matrix.goarch }}"
          VERSION="${{ steps.version.outputs.value }}" \
          COMMIT="${{ steps.build_meta.outputs.commit }}" \
          BUILD_TIME="${{ steps.build_meta.outputs.build_time }}" \
          DIST_DIR=dist \
          APP=csgclaw-cli \
          GOCACHE="${{ github.workspace }}/.gocache" \
          CGO_ENABLED=1 \
          ./scripts/package-release.sh "${{ matrix.goos }}" "${{ matrix.goarch }}"

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.value }}
          files: dist/*

      - name: Upload dist artifact for Gitee mirror
        uses: actions/upload-artifact@v4
        with:
          name: release-dist-${{ matrix.goos }}-${{ matrix.goarch }}
          path: dist/*

  mirror-gitee-release:
    name: Mirror release assets to Gitee
    needs: build-and-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download release dist
        uses: actions/download-artifact@v4
        with:
          pattern: release-dist-*
          merge-multiple: true
          path: dist

      - name: Resolve version
        id: ver
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "value=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "value=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to Gitee
        env:
          GITEE_TOKEN: ${{ secrets.GITEE_TOKEN }}
          GITEE_REPO: ${{ vars.GITEE_REPO }}
        shell: bash
        run: |
          if [ -z "${GITEE_TOKEN}" ] || [ -z "${GITEE_REPO}" ]; then
            echo "GITEE_TOKEN or GITEE_REPO unset; skip Gitee mirror"
            exit 0
          fi
          chmod +x scripts/publish-gitee-release.sh
          ./scripts/publish-gitee-release.sh "${{ steps.ver.outputs.value }}"
